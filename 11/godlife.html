<!DOCTYPE html>
<html>
    <head>
<title>갓생 살기</title><br>


<style>
html, body { margin: 0; padding: 0; height: 100%; }
header {
	width: 100%; height: 15%; 
	background: rgb(238, 238, 180);
}
nav { 
	width: 25%; height: 70%; float: left;
	background: rgb(236, 213, 169);
}
section {
	width: 60%; height: 70%; float: left;
	background: rgb(212, 236, 164);
}
aside {
	width: 15%; height: 70%; float: left;
	background: rgb(236, 213, 169);
}
footer { 
	width: 100%; height: 20%; clear: both; 
	background: rgb(243, 227, 241);
}
</style>
    </head>
<body>
<header><h2>갓생 살기</h2>
운동을 하면 삶의 질이 올라간다. 너도 할 수 있다 갓생.
</header>

<hr>
<nav>
<img src="img/0.png"><br>
<img src="img/1.png"><br>
<img src="img/2.png">


</nav>
<section>
<label>운동시간 : <input type="time" value="00:00"><br><br></label>
운동부위 : 
<label><input type="radio" name="food" value="1"> 상체</label>
<label><input type="radio" name="food" value="2"> 하체</label><br><br>
운동 종류 : 
<input type="text" list="11">
<datalist id="11">
    <option value="턱걸이"></option>
    <option value="런닝머신"></option>
    <option value="벤치프레스"></option>
    <option value="런닝"></option>
</datalist><br><br>
<label>운동량 : <progress value="0" max="10"></progress><br><br></label>
<label>목표 달성일 : <input type="date"><br><br><br></label>

주의사항 : 

<ul>
    <li>운동할 때 한계 이상으로 하지 않을것</li>
    <li>준비시간과 씻는 시간을 포함하지 않을것</li>

</ul>
<label>다짐 : <textarea cols="30" rows="10"></textarea><br><br></label>
<br><br>
<input type="submit" value="제출">
</section>

</aside>

<footer>
<h2>초심을 잃지마라 항상 처음마음으로 너도 근육몬 될 수 있어.</h2>

</footer>


</body>

</html>
